naftiko: 1.0.0-alpha2
info:
  label: Interswitch Payment Gateway API — Payments
  description: Server-to-server card payments and payment-link creation on the Interswitch Payment Gateway.
  tags:
  - Interswitch
  - Payments
  - Card Payments
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    INTERSWITCH_BEARER_TOKEN: INTERSWITCH_BEARER_TOKEN
capability:
  consumes:
  - type: http
    namespace: payment-gateway-payments
    baseUri: https://qa.interswitchng.com
    description: Interswitch Payment Gateway business capability.
    resources:
    - name: payments
      path: /paymentgateway/api/v1/payments
      operations:
      - name: createCardPayment
        method: POST
        description: Authorize and capture a card payment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: payment-by-id
      path: /paymentgateway/api/v1/payments/{paymentId}
      operations:
      - name: getPayment
        method: GET
        description: Retrieve a payment by ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentId
          in: path
          type: string
          required: true
    - name: payment-links
      path: /paymentgateway/api/v1/payment-links
      operations:
      - name: createPaymentLink
        method: POST
        description: Create a hosted payment link.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Bearer {{env.INTERSWITCH_BEARER_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: payment-gateway-payments-rest
    port: 8080
    resources:
    - path: /v1/payments
      name: payments
      operations:
      - method: POST
        name: createCardPayment
        call: payment-gateway-payments.createCardPayment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getPayment
        path: /v1/payments/{paymentId}
        call: payment-gateway-payments.getPayment
        with:
          paymentId: rest.path.paymentId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payment-links
      name: payment-links
      operations:
      - method: POST
        name: createPaymentLink
        call: payment-gateway-payments.createPaymentLink
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payment-gateway-payments-mcp
    port: 9090
    transport: http
    tools:
    - name: interswitch-create-card-payment
      description: Authorize and capture a card payment.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payment-gateway-payments.createCardPayment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: interswitch-get-payment
      description: Retrieve a card payment by ID.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payment-gateway-payments.getPayment
      with:
        paymentId: tools.paymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: interswitch-create-payment-link
      description: Create a hosted payment link.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payment-gateway-payments.createPaymentLink
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
