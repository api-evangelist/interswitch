    type: JSONLD
  - type: NaftikoCapability
    url: capabilities/web-checkout-payments.yaml
  description: Interswitch Web Checkout (formerly Webpay) is the company's hosted payment gateway. Two integration modes — inline JavaScript popup (`newwebpay.interswitchng.com/inline-checkout.js`) and Web Redirect form POST to `/collections/w/pay` — plus a server-side requery endpoint at `/collections/api/v1/gettransaction.json` for authoritative confirmation. Supports Verve, Visa, and Mastercard, with mandatory server-side verification before delivering value.
- aid: interswitch:interswitch-payment-gateway-api
  name: Interswitch Payment Gateway API
  tags:
  - Payments
  - Card Payments
  - Hosted Fields
  - 3D Secure
  - Africa
  humanURL: https://docs.interswitchgroup.com/docs/accept-payments
  properties:
  - url: https://docs.interswitchgroup.com/docs/accept-payments
    type: Documentation
  - url: openapi/interswitch-payment-gateway-api-openapi.yml
    type: OpenAPI
  - url: json-schema/interswitch-payment-schema.json
    type: JSONSchema
  - type: NaftikoCapability
    url: capabilities/payment-gateway-payments.yaml
  description: Server-to-server card payment APIs for PCI-DSS-licensed merchants — direct Card Payments, Hosted Fields, 3D Secure step-up, Google Pay, and Pay Bill payment-link generation. Base path `/paymentgateway` on the Interswitch QA/production hosts with OAuth 2.0 client_credentials authentication via the Passport token endpoint.
- aid: interswitch:interswitch-transfers-api
  name: Interswitch Transfers API
  tags:
  - Transfers
  - Payouts
  - Disbursement
  - Bank Transfer
  - Africa
  humanURL: https://docs.interswitchgroup.com/docs/single-transfer
  properties:
  - url: https://docs.interswitchgroup.com/docs/single-transfer
    type: Documentation
  - url: openapi/interswitch-transfers-api-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/transfers-transfers.yaml
  description: Quickteller Send Money APIs covering Single Transfer (POST /quicktellerservice/api/v5/transactions/TransferFunds), Bulk Transfer, Name Inquiry, and Bank Code Resolution. Used by banks, fintechs, and PSPs to disburse funds across NIBSS-Instant-Payment-connected Nigerian bank accounts with SHA-512 MAC authentication on each request.
- aid: interswitch:interswitch-bills-payment-api
  name: Interswitch Bills Payment API
  tags:
  - Bills
  - Quickteller
  - Utilities
  - Cable TV
  - Value Added Services
  - Africa
  humanURL: https://docs.interswitchgroup.com/docs/bills-payment
  properties:
  - url: https://docs.interswitchgroup.com/docs/bills-payment
    type: Documentation
  - url: openapi/interswitch-bills-payment-api-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/bills-payment-quickteller.yaml
  description: Quickteller bills payment service — list billers (`GET /api/v2/quickteller/billers`), get payment items, validate customer references, and submit payment advices for DSTV, GOTV, PHCN, water boards, school fees, government TSA payments, and hundreds of other Nigerian billers. Uses the InterswitchAuth legacy signature scheme (Authorization + Timestamp + Nonce + Signature + SignatureMethod + TerminalID headers).
- aid: interswitch:interswitch-airtime-recharge-api
  name: Interswitch Airtime Recharge API
  tags:
  - Airtime
  - Top-up
  - Virtual Top-up
  - E-Pins
  - Telco
  - Africa
  humanURL: https://docs.interswitchgroup.com/docs/airtime-recharge
  properties:
  - url: https://docs.interswitchgroup.com/docs/airtime-recharge
    type: Documentation
  - url: openapi/interswitch-airtime-recharge-api-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/airtime-recharge-quickteller.yaml
  description: Virtual top-up (direct airtime and data) and e-pin voucher delivery for MTN, Airtel, Glo, and 9mobile. Same biller/category/payment-item flow as Bills Payment, with category ID 4 reserved for airtime billers; phone number is supplied as `customer_id` on the `/api/v2/quickteller/payments/advices` payload.
- aid: interswitch:interswitch-paycode-api
  name: Interswitch Paycode API
  tags:
  - Paycode
  - Cardless
  - Cash Withdrawal
  - Tokens
  - Africa
  humanURL: https://docs.interswitchgroup.com/docs/single-paycode
  properties:
  - url: https://docs.interswitchgroup.com/docs/single-paycode
    type: Documentation
  - url: openapi/interswitch-paycode-api-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/paycode-tokens.yaml
  description: Cardless cash and merchant tokens (Pay with Mobile / Paycode). Generate single or bulk one-time tokens via `POST /api/v1/pwm/subscribers/{subscriberId}/tokens`, query token status, and cancel tokens at `/cardless-service/api/v1/cardless-services/cancel-token`. Powers ATM cardless withdrawal across the Interswitch-acquired ATM network.
- aid: interswitch:interswitch-refunds-api
  name: Interswitch Refunds API
  tags:
  - Refunds
  - Payments
  - Quickteller Business
  - Africa
  humanURL: https://docs.interswitchgroup.com/docs/refunds
  properties:
  - url: https://docs.interswitchgroup.com/docs/refunds
    type: Documentation
  - url: openapi/interswitch-refunds-api-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/refunds-refunds.yaml
  description: Refund successful Quickteller Business transactions in full or in part via `POST /paymentgateway/api/v1/refunds`. Tracks refund lifecycle through SUCCESS, PENDING, PROCESSING, COMPLETE, COMPLETE_MANUAL, and FAILED states; auto-refunds settle T+1.
- aid: interswitch:interswitch-recurring-payments-api
  name: Interswitch Recurring Payments API
  tags:
  - Recurring
  - Subscriptions
  - Tokenization
  - Card On File
  - Africa
  humanURL: https://docs.interswitchgroup.com/docs/recurring-payments
  properties:
  - url: https://docs.interswitchgroup.com/docs/recurring-payments
    type: Documentation
  - url: openapi/interswitch-recurring-payments-api-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/recurring-payments-subscriptions.yaml
